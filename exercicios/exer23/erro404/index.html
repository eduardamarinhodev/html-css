<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 - Página não encontrada</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- CONTAINER PRINCIPAL COM BACKGROUND PERSONALIZADO -->
    <div class="background-principal">
      <!-- DECORAÇÃO 1: Forma geométrica com background (canto superior esquerdo) -->
      <div class="forma-decorativa forma-1"></div>

      <!-- DECORAÇÃO 2: Forma geométrica com background (canto inferior direito) -->
      <div class="forma-decorativa forma-2"></div>

      <!-- CONTEÚDO PRINCIPAL CENTRALIZADO -->
      <div class="container">
        <!-- NÚMERO DO ERRO 404 -->
        <div class="numero-404">404</div>

        <!-- MENSAGEM DE ERRO -->
        <h1 class="titulo">Página não encontrada!</h1>
        <p class="descricao">
          Parece que você se perdeu. A página que você está procurando não
          existe ou foi movida.
        </p>

        <!-- BOTÃO PARA VOLTAR -->
        <a href="javascript:history.back()" class="botao-voltar">
          ← Voltar à página anterior
        </a>

        <!-- DECORAÇÃO ADICIONAL: Padrão em forma de círculos -->
        <div class="padrao-decorativo padrao-1"></div>
        <div class="padrao-decorativo padrao-2"></div>
        <div class="padrao-decorativo padrao-3"></div>
      </div>
    </div>
  </body>
</html>
