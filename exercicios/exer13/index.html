<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vídeos com html</title>
</head>
<body>
    <h1>Inserindo Vídeos hospedados localmente.</h1>
    <p>Este vídeo está hospedado localmente no meu computador.</p>
    <video width="500" poster="imagens/foto.jpg" controls>
        <source src="media/Meuvideo.webm" type="video/webm">
        Seu navegador não suporta o elemento de vídeo.
    </video>
    <h1>Inserindo vídeos do YouTube</h1>
    <p>Este vídeo está hospedado no YouTube.</p>
    <iframe width="560" height="315" src="https://www.youtube.com/embed/21mDekTZwsw?si=T72U1abUN9Bg9mS1" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
</body>
</html>
