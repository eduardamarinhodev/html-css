<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes Externas no computador</title>
    <style>
        @font-face {
            font-family: "Kissing Season";
            src: url('Kissing Season.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }
        body {
            font-family: Arial, Helvetica, sans-serif;
        }
        h1 {
            font-family: "Kissing Season", Times, serif;
            font-size: 3em;
            font-weight: 900;
        }
    </style>
</head>
<body>
    <h1>Olá, Mundo!</h1>
    <p>Lorem ipsum dolor, sit amet consectetur adipisicing elit. Nobis officia sapiente nisi et eum aperiam eos delectus ratione, consequuntur rerum illo, sint tenetur aliquam, non repellendus libero recusandae natus reprehenderit.</p>
</body>
</html>
