<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midias em HTML5</title>
</head>
<body>
    <h1>Imagens Dinamicas</h1>
    <p>Tente abrir este site em varios dispositivos, se não, aumente e dimiua o seu navegador.</p>
    <picture>
        <source media="(max-width: 750px)" srcset="imagens/foto-p.webp" type="image/webp">
        <source media="(max-width: 1050px)" srcset="imagens/foto-m.webp" type="image/webp">
        <img src="imagens/foto-g.webp" alt="imagem flexivél">
    </picture>
    <h1>Reproduzindo Audios</h1>
    <p>Vamos aprender a reproduzir audios em HTML5.</p>
    <audio preload="metadata" controls autoplay>
    <source src="media/musicgame.mp3" type="audio/mpeg">
    <source src="media/musicgame.ogg" type="audio/ogg">
    <source src="media/musicgame.wav" type="audio/wav">
    <p>Seu navegador não suporta a reprodução de áudio.</p>
    </audio>
</body>
</html>
