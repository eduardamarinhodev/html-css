<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grouping tags</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            h1 {
                margin: 0px;
            }
            background-color: #f0f0f0;
            padding: 1rem;
        }

        nav a {
            margin-right: 1rem;
            text-decoration: none;
            color: #333;
        }

        main {
            padding: 1rem;
        }

        section {
            margin-bottom: 2rem;
        }

        article {
            border: 1px solid #464646;
            border-radius: 5px;
            box-shadow: 3px 5px 10px rgba(0, 0, 0, 0.158);
            padding: 1rem;
            margin-bottom: 1rem;
        }

        aside {
            background-color: #e0e0e0;
            padding: 0.5rem;
            border-left: 3px solid #007bff;
        }

        footer {
            background-color: #f0f0f0;
            padding: 1rem;
            text-align: left;
        }
    </style>
</head>
<body>
    <header>
        <h1>Meu site</h1>
        <nav>
            <a href="">Home</a>
            <a href="">Sobre</a>
            <a href="">Contato</a>
        </nav>
    </header>
    <main>
        <section id="assuntos">
        </section>
        <section id="noticias">
            <article>
                <h2>Notícias sobre o Brasil</h2>
                <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Voluptas, voluptate.</p>
                <aside><p>Artigo escrito por José da Silva.</p></aside>
            </article>
        </section>
    </main>
    <footer>
        <p>© 2024 Meu site. Todos os direitos reservados.</p>
</body>
</html>
