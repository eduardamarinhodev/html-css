<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h1 { /*Box-level*/
             background-color: #d6d6d6;
             height: 300px;
             width: 300px;
            background-color: #d6d6d6;
            height: 300px;
            width: 300px;
            
            border: 10px solid #ff150c;
            /*Borda simplificada, sem necessidade de colocar as 4 bordas*/
            padding: 10px;

            margin: 20px auto 40px auto;
        }
        a { /*Inline-level*/
             background-color: #d6d6d6;
             height: 300px;
             width: 300px;
            border: 10px solid #ff150c;
            padding: 10px;
             margin: 10px;
        }
    </style>
</head>
<body>
    <h1>
        Exemplo de caixa box-level
    </h1>
    <p>Parágrafos também são exemplos de box-level, mas os <a href="">links são exemplos de inline-level.</a> Vamos ver como tudo isso funciona.</p>
</body>
</html>
